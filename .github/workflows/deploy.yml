name: Deploy — ECR + EC2

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: production
        type: choice
        options: [production, staging]

env:
  AWS_REGION:       ${{ vars.AWS_REGION }}
  ECR_REGISTRY:     ${{ vars.ECR_REGISTRY }}       # e.g. 123456789.dkr.ecr.eu-west-1.amazonaws.com
  ECR_REPOSITORY:   medoq-backend
  IMAGE_TAG:        ${{ github.sha }}

jobs:
  # ── 1. Run tests first ──────────────────────────────────────────────────────
  test:
    name: Run Tests
    uses: ./.github/workflows/ci.yml

  # ── 2. Build Docker image + push to ECR ────────────────────────────────────
  build-push:
    name: Build & Push to ECR
    needs: test
    runs-on: ubuntu-latest

    outputs:
      image: ${{ steps.build.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Output image URI
        run: echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}" >> $GITHUB_OUTPUT

  # ── 3. Deploy to EC2 via SSH ────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    needs: build-push
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:       ${{ secrets.EC2_HOST }}
          username:   ${{ secrets.EC2_USER }}
          key:        ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            # Pull latest image from ECR
            aws ecr get-login-password --region ${{ env.AWS_REGION }} \
              | docker login --username AWS --password-stdin ${{ env.ECR_REGISTRY }}

            docker pull ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }}

            # Tag as latest locally
            docker tag \
              ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ env.IMAGE_TAG }} \
              medoq-backend:latest

            # Restart the service (docker-compose on EC2 reads /opt/medoq/.env)
            cd /opt/medoq
            docker compose up -d --no-deps --force-recreate backend

            # Wait for health check to pass (max 90s)
            echo "Waiting for backend health..."
            for i in $(seq 1 18); do
              STATUS=$(curl -sf http://localhost:8080/api/v1/actuator/health | \
                python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "")
              if [ "$STATUS" = "UP" ]; then
                echo "Backend is UP after $((i*5))s"
                exit 0
              fi
              sleep 5
            done
            echo "Backend did not become healthy in time" && exit 1

      - name: Notify on failure
        if: failure()
        run: |
          echo "Deployment FAILED for commit ${{ github.sha }}"
          # Add Slack/email notification here if needed
