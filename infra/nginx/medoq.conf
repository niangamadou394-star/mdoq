# ============================================================
# Medoq — Nginx reverse-proxy config
# Place at: /etc/nginx/sites-available/medoq
# Enable:   ln -s /etc/nginx/sites-available/medoq /etc/nginx/sites-enabled/
# TLS certs managed by Certbot:
#   certbot --nginx -d api.medoq.sn -d www.medoq.sn
# ============================================================

# Rate limiting zones (defined in http block / nginx.conf)
# limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
# limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;

# ── Redirect HTTP → HTTPS ────────────────────────────────────
server {
    listen 80;
    server_name api.medoq.sn medoq.sn www.medoq.sn;
    return 301 https://$host$request_uri;
}

# ── API backend ───────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.medoq.sn;

    # TLS (filled in by Certbot)
    ssl_certificate     /etc/letsencrypt/live/api.medoq.sn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.medoq.sn/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           DENY                                  always;
    add_header X-Content-Type-Options    nosniff                               always;
    add_header Referrer-Policy           strict-origin-when-cross-origin       always;

    # Request size limit (for PDF uploads etc.)
    client_max_body_size 10M;

    # ── /api/v1/** → Spring Boot ──────────────────────────────
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeouts for long-running endpoints (invoice generation)
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;

        # Rate limit — general API
        # limit_req zone=api burst=20 nodelay;
    }

    # ── /api/v1/auth/** — stricter rate limit ─────────────────
    location ~ ^/api/v1/auth/(login|register|forgot-password) {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # limit_req zone=auth burst=5 nodelay;
    }

    # ── /ussd — Africa's Talking callback ─────────────────────
    # Restrict to AT IP ranges in production
    location /api/v1/ussd {
        # allow 196.201.214.0/24;   # Africa's Talking IP range
        # deny  all;
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── WebSocket for real-time reservations ──────────────────
    location /api/v1/ws {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_read_timeout 3600s;
    }

    # ── Health check (no auth needed for LB) ─────────────────
    location /api/v1/actuator/health {
        proxy_pass       http://127.0.0.1:8080;
        access_log       off;
    }

    # Block access to other actuator endpoints
    location /api/v1/actuator/ {
        deny all;
        return 403;
    }
}
