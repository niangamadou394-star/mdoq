spring:
  application:
    name: medoq-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/medoq_db}
    username: ${SPRING_DATASOURCE_USERNAME:medoq_user}
    password: ${SPRING_DATASOURCE_PASSWORD:medoq_pass}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public

  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      password: ${SPRING_REDIS_PASSWORD:medoq_redis_pass}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: Africa/Dakar

server:
  port: 8080
  servlet:
    context-path: /api/v1

medoq:
  jwt:
    secret: ${JWT_SECRET:medoq_super_secret_jwt_key_change_in_production_2024}
    expiration: ${JWT_EXPIRATION:86400000}        # 24h
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7d

  cors:
    allowed-origins:
      - http://localhost:4200
      - http://localhost:3000

  payment:
    wave:
      api-key: ${WAVE_API_KEY:wave_sn_test_key}
      api-url: https://api.wave.com/v1
      webhook-secret: ${WAVE_WEBHOOK_SECRET:wave_webhook_test_secret}
      success-url: ${APP_BASE_URL:http://localhost:8080}/payment/success
      error-url:   ${APP_BASE_URL:http://localhost:8080}/payment/error
    orange:
      merchant-key: ${ORANGE_MERCHANT_KEY:om_test_merchant_key}
      api-url: ${ORANGE_API_URL:https://api.orange.sn/orange-money-webpay/dev/v1}
      notif-token: ${ORANGE_NOTIF_TOKEN:om_notif_test_token}
      return-url: ${APP_BASE_URL:http://localhost:8080}/webhooks/orange-money

  billing:
    start-date: ${PLATFORM_START_DATE:2024-01-01}

  # Africa's Talking
  at:
    api-key:   ${AT_API_KEY:sandbox_key}
    username:  ${AT_USERNAME:sandbox}
    sender-id: ${AT_SENDER_ID:Medoq}
    ussd-service-code: ${AT_USSD_CODE:*338#}

  # Firebase Cloud Messaging (service-account JSON path or base64)
  fcm:
    # Path to firebase-service-account.json, or leave blank to auto-detect
    # from GOOGLE_APPLICATION_CREDENTIALS env var
    service-account-path: ${FCM_SERVICE_ACCOUNT_PATH:}

  security:
    # 32-byte base64-encoded AES-256 key — override via env var ENCRYPTION_KEY
    encryption-key: ${ENCRYPTION_KEY:bWVkb3Ffc2VjcmV0X2tleV8zMmNoYXJhY3RlcnM=}

  email:
    from: ${EMAIL_FROM:noreply@medoq.sn}
    from-name: Medoq

spring:
  mail:
    host: ${SMTP_HOST:smtp.gmail.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.medoq: DEBUG
    org.springframework.security: INFO
